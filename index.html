<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楞次定律 · 交互实验室</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link rel="stylesheet" href="styles.css">

<!-- Fix Three.js resolution with importmap -->
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<style>
  .neon-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(6, 182, 212, 0.2);
    border-radius: 2px;
    outline: none;
  }
  .neon-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #06b6d4;
    cursor: pointer;
    box-shadow: 0 0 10px #06b6d4;
  }
  .tech-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 8px;
    font-size: 12px;
    color: #a5f3fc;
    background: rgba(6, 182, 212, 0.1);
    border: 1px solid rgba(6, 182, 212, 0.3);
    border-radius: 4px;
    transition: all 0.3s;
  }
  .tech-btn:hover {
    background: rgba(6, 182, 212, 0.2);
    box-shadow: 0 0 12px rgba(6, 182, 212, 0.4);
  }
  .galvanometer {
    position: relative;
    width: 100%;
    height: 80px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(6, 182, 212, 0.3);
    border-radius: 6px;
    overflow: hidden;
  }
  .gauge-scale {
    display: flex;
    justify-content: space-between;
    padding: 4px 10px;
    font-size: 10px;
    color: #67e8f9;
  }
  .gauge-track {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 140px;
    height: 70px;
    transform: translateX(-50%);
    border-top-left-radius: 70px;
    border-top-right-radius: 70px;
    border: 2px solid rgba(6, 182, 212, 0.2);
    border-bottom: none;
  }
  .gauge-needle {
    position: absolute;
    bottom: -4px;
    left: 50%;
    width: 2px;
    height: 65px;
    background: #f97316;
    transform-origin: bottom center;
    transform: translateX(-50%) rotate(0deg);
    transition: transform 0.1s ease-out;
    box-shadow: 0 0 5px #f97316;
  }
  .gauge-center {
    position: absolute;
    bottom: -6px;
    left: 50%;
    width: 12px;
    height: 12px;
    background: #fff;
    border-radius: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 8px #fff;
  }
</style>
</head>
<body class="bg-black text-cyan-100 overflow-hidden">

<div class="grid-bg"></div>

<!-- Loading Screen -->
<div id="loading-screen" class="fixed inset-0 z-50 bg-black/95 backdrop-blur-md flex flex-col items-center justify-center transition-opacity duration-1000">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(6,182,212,0.1),transparent_50%)] pointer-events-none"></div>
  <div class="relative z-10 w-full max-w-md px-6 flex flex-col items-center">
    <div class="w-16 h-16 mb-6 relative">
      <div class="absolute inset-0 rounded-full border-t-2 border-cyan-400 animate-spin"></div>
      <div class="absolute inset-2 rounded-full border-r-2 border-orange-400 animate-[spin_1.5s_linear_infinite_reverse]"></div>
      <i data-lucide="zap" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 text-cyan-300"></i>
    </div>
    <h1 class="text-3xl font-bold tracking-[0.2em] text-cyan-300 mb-2">LENZ'S LAW</h1>
    <p class="text-[10px] tracking-widest text-cyan-500/80 mb-10">交互式物理仿真实验系统</p>
    
    <div class="w-full h-1 bg-cyan-950 rounded overflow-hidden mb-6">
      <div id="loading-progress" class="h-full bg-gradient-to-r from-cyan-600 to-cyan-300 w-0 transition-all duration-300 shadow-[0_0_10px_#06b6d4]"></div>
    </div>
    
    <div id="trivia-container" class="h-16 flex items-center justify-center text-center">
      <p id="trivia-text" class="text-xs text-cyan-200/80 leading-relaxed"></p>
    </div>
    
    <button id="btn-start" class="hidden mt-8 px-8 py-3 bg-cyan-900/30 border border-cyan-400/50 hover:bg-cyan-800/50 hover:border-cyan-300 rounded text-sm tracking-widest text-cyan-50 transition-all duration-300 shadow-[0_0_15px_rgba(6,182,212,0.2)] hover:shadow-[0_0_20px_rgba(6,182,212,0.4)] flex items-center gap-2">
      <i data-lucide="play" class="w-4 h-4"></i>
      启动实验
    </button>
  </div>
</div>

<header class="absolute top-0 left-0 right-0 z-20 px-4 md:px-6 py-4 flex items-center justify-between backdrop-blur-md bg-black/40 border-b border-cyan-500/20 opacity-0">
  <div class="flex items-center gap-3">
    <div class="w-2 h-8 bg-gradient-to-b from-cyan-400 to-orange-400 rounded-full shadow-[0_0_15px_#06b6d4]"></div>
    <div>
      <h1 class="text-lg md:text-xl font-bold tracking-widest text-cyan-300">LENZ'S LAW</h1>
      <p class="text-[8px] md:text-[10px] tracking-[0.3em] text-orange-300/70">楞次定律 · 交互式仿真实验室</p>
    </div>
  </div>
  <div class="flex gap-4 items-center">
    <div id="hud" class="hidden md:flex gap-6 text-xs font-mono bg-black/30 px-4 py-2 rounded border border-cyan-500/20">
      <div class="flex flex-col"><span class="text-[10px] text-cyan-500">磁通量 Φ</span><span id="hud-flux" class="text-cyan-300">0.0000 Wb</span></div>
      <div class="flex flex-col"><span class="text-[10px] text-cyan-500">dΦ/dt</span><span id="hud-dflux" class="text-orange-300">0.0000</span></div>
      <div class="flex flex-col"><span class="text-[10px] text-cyan-500">感应电流 I</span><span id="hud-current" class="text-cyan-300">0.0000 A</span></div>
      <div class="flex flex-col"><span class="text-[10px] text-cyan-500">感生磁场 B_ind</span><span id="hud-dir" class="text-fuchsia-300">— 无 —</span></div>
    </div>
    <button id="btn-mute" class="text-cyan-500 hover:text-cyan-300 transition-colors p-2 bg-black/30 rounded border border-cyan-500/20 shadow-[0_0_10px_rgba(6,182,212,0.1)]" title="切换声音提示">
      <i data-lucide="volume-2" id="icon-volume" class="w-5 h-5"></i>
    </button>
  </div>
</header>

<main class="relative w-screen h-screen">
  <div id="canvas-container" class="absolute inset-0"></div>

  <!-- Smart HUD Teaching System -->
  <div id="teaching-hud" class="absolute top-28 left-1/2 -translate-x-1/2 w-11/12 md:w-[520px] pointer-events-none flex flex-col gap-3 transition-opacity duration-500 opacity-0 z-30">
    <div class="bg-black/60 backdrop-blur-md border border-cyan-500/30 border-l-4 border-l-cyan-400 rounded-r-lg p-3 shadow-[0_0_15px_rgba(6,182,212,0.15)]">
      <div class="text-[10px] text-cyan-300 mb-1 tracking-widest font-bold flex items-center gap-2">
        <i data-lucide="activity" class="w-3 h-3"></i> STEP 1 / 磁通量变化
      </div>
      <div id="teach-step1" class="text-sm font-medium text-cyan-50">...</div>
    </div>
    <div class="bg-black/60 backdrop-blur-md border border-fuchsia-500/30 border-l-4 border-l-fuchsia-400 rounded-r-lg p-3 shadow-[0_0_15px_rgba(217,70,239,0.15)]">
      <div class="text-[10px] text-fuchsia-300 mb-1 tracking-widest font-bold flex items-center gap-2">
        <i data-lucide="shield-alert" class="w-3 h-3"></i> STEP 2 / 楞次定律响应
      </div>
      <div id="teach-step2" class="text-sm font-medium text-fuchsia-50">...</div>
    </div>
    <div class="bg-black/60 backdrop-blur-md border border-orange-500/30 border-l-4 border-l-orange-400 rounded-r-lg p-3 shadow-[0_0_15px_rgba(249,115,22,0.15)]">
      <div class="text-[10px] text-orange-300 mb-1 tracking-widest font-bold flex items-center gap-2">
        <i data-lucide="zap" class="w-3 h-3"></i> STEP 3 / 感应电流方向
      </div>
      <div id="teach-step3" class="text-sm font-medium text-orange-50">...</div>
    </div>
  </div>

  <aside id="control-panel" class="absolute right-4 top-24 bottom-4 w-72 md:w-80 z-10 p-4 md:p-5 flex flex-col gap-4 md:gap-5 overflow-y-auto bg-black/40 backdrop-blur-md border border-cyan-500/20 shadow-[0_0_20px_rgba(6,182,212,0.1)] rounded-lg pointer-events-auto opacity-0">
    <div>
      <h2 class="text-sm font-bold text-cyan-300 tracking-widest mb-1">⌬ 控制面板</h2>
      <p class="text-[10px] text-cyan-500/60">CONTROL CONSOLE</p>
    </div>

    <div class="space-y-5">
      <div class="control-group">
        <div class="flex justify-between items-center mb-2">
          <label class="text-xs text-cyan-200">线圈匝数 N</label>
          <span id="val-turns" class="text-xs font-mono text-orange-300">200</span>
        </div>
        <input id="ctrl-turns" type="range" min="1" max="500" value="200" step="1" class="neon-slider">
      </div>

      <div class="control-group">
        <div class="flex justify-between items-center mb-2">
          <label class="text-xs text-cyan-200">磁性强度 m</label>
          <span id="val-strength" class="text-xs font-mono text-orange-300">1.0</span>
        </div>
        <input id="ctrl-strength" type="range" min="0.5" max="5.0" value="1.0" step="0.1" class="neon-slider">
      </div>

      <div class="control-group">
        <div class="flex justify-between items-center mb-2">
          <label class="text-xs text-cyan-200">响应速度 (阻尼)</label>
          <span id="val-damping" class="text-xs font-mono text-orange-300">0.5</span>
        </div>
        <input id="ctrl-damping" type="range" min="0.05" max="1.0" value="0.5" step="0.05" class="neon-slider">
      </div>
    </div>

    <div class="border-t border-cyan-500/20 pt-4 space-y-3">
      <button id="btn-flip" class="tech-btn">
        <i data-lucide="repeat" class="w-4 h-4"></i>
        <span>翻转磁极 (N⇄S)</span>
      </button>
      <button id="btn-auto" class="tech-btn">
        <i data-lucide="waves" class="w-4 h-4"></i>
        <span>自动简谐运动</span>
      </button>
      <button id="btn-reset" class="tech-btn">
        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
        <span>重置实验</span>
      </button>
    </div>

    <div class="border-t border-cyan-500/20 pt-4 mt-auto">
      <h3 class="text-xs font-bold text-cyan-300 mb-2 tracking-widest">⚡ 检流计</h3>
      <div class="galvanometer">
        <div class="gauge-scale">
          <span>-I</span><span>0</span><span>+I</span>
        </div>
        <div class="gauge-track">
          <div id="gauge-needle" class="gauge-needle"></div>
          <div class="gauge-center"></div>
        </div>
        <div id="gauge-label" class="absolute bottom-1 w-full text-center text-xs font-mono text-cyan-400">I = 0.00 A</div>
      </div>
    </div>
  </aside>

  <!-- Echarts Dashboard -->
  <div id="chart-panel" class="absolute left-4 bottom-4 z-10 p-4 w-[calc(100%-2rem)] md:w-[420px] bg-black/40 backdrop-blur-md border border-cyan-500/20 shadow-[0_0_20px_rgba(6,182,212,0.1)] rounded-lg pointer-events-auto hidden md:block opacity-0">
    <div class="flex justify-between items-center mb-2">
      <h3 class="text-xs font-bold text-cyan-300 tracking-widest flex items-center gap-2">
        <i data-lucide="line-chart" class="w-4 h-4"></i>实时波形数据
      </h3>
      <span class="text-[10px] text-cyan-500/60 font-mono">Φ(t) & I(t)</span>
    </div>
    <div id="echarts-container" class="w-full h-32"></div>
  </div>

</main>

<script type="module" src="main.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
